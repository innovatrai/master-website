<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You | innovatr.ai</title>
  <meta name="robots" content="noindex,nofollow" />
  <meta name="description" content="Thanks for contacting innovatr.ai. Your discovery call request has been received." />
  <link rel="canonical" href="https://innovatr.ai/thank-you.html" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d1324;
      --panel: rgba(18, 25, 54, 0.88);
      --text: #edf2ff;
      --muted: #b7c3e2;
      --line: rgba(255,255,255,0.1);
      --brand: #4f7cff;
      --shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #0b1020 0%, #0d1324 100%);
    }
    .card {
      width: min(760px, 100%);
      padding: 36px;
      border-radius: 28px;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }
    .eyebrow {
      margin: 0 0 10px;
      color: #9fc0ff;
      font-size: .82rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    h1 {
      margin: 0 0 14px;
      line-height: 1.08;
      letter-spacing: -.04em;
      font-size: clamp(2.2rem, 5vw, 4rem);
    }
    p {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.6;
    }
    .actions {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 24px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 13px 18px;
      border-radius: 14px;
      background: var(--brand);
      color: white;
      font-weight: 700;
      text-decoration: none;
    }
    .btn-secondary {
      background: transparent;
      border: 1px solid var(--line);
      color: var(--text);
    }
    @media (max-width: 640px) {
      .card { padding: 28px; }
      .btn, .btn-secondary { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="card">
    <p class="eyebrow">Request received</p>
    <h1>Thanks. Your discovery call request is in.</h1>
    <p>We’ve received your details and will review the enquiry shortly.</p>
    <p>If it looks like a good fit, we’ll be in touch to discuss the next step.</p>
    <div class="actions">
      <a class="btn" href="index.html">Back to homepage</a>
      <a class="btn btn-secondary" href="index.html#services">View services</a>
    </div>
  </main>
</body>
</html>
